version: 2

models:
  - name: dim_customers
    description: "Customer dimension — one row per customer order id"
    columns:
      - name: customer_id
        description: "Unique customer order identifier"
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null

  - name: dim_sellers
    description: "Seller dimension — one row per seller"
    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - not_null
          - unique
      - name: seller_state
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension with English category names"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - not_null
          - unique
      - name: product_category_name_english
        tests:
          - not_null

  - name: dim_date
    description: "Date dimension spine from 2016-01-01 to 2020-12-31"
    columns:
      - name: date_id
        tests:
          - not_null
          - unique
      - name: full_date
        tests:
          - not_null
          - unique

  - name: fact_orders
    description: "One row per order with delivery metrics"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable',
                       'processing', 'invoiced', 'approved', 'created']
      - name: purchase_date_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

  - name: fact_order_items
    description: "One row per order line item"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id
      - name: price
        tests:
          - not_null

  - name: fact_payments
    description: "One row per payment record"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_value
        tests:
          - not_null

  - name: fact_reviews
    description: "One row per review"
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: review_sentiment
        tests:
          - not_null
          - accepted_values:
              values: ['positive', 'neutral', 'negative']